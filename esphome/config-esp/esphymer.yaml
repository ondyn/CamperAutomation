esphome:
  name: esphymer
  friendly_name: EspHymer
  # platformio_options:
  #   monitor_speed: 115200
  #   board_build.mcu: esp32c3
  #   board_build.variant: esp32c3
  #   board_build.flash_mode: dio 
  #   board_upload.flash_size: "2MB"
  #   board_upload.maximum_size: 2097152
  #   board_build.partitions: c3_2mb_partition.csv

esp32:
  board: esp32-c3-devkitm-1
  # board: lolin_c3_mini
  framework:
    type: esp-idf
    version: "6.0.1"  # 6.0.x restructured esp_timer/esp_system sources; no more system_time.c collision
    #type: arduino

# esp32:
#   board: esp32dev
#   variant: ESP32C3
#   framework:
#     type: esp-idf
#     version: recommended

# Enable logging
# logger:
#   level: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: "DxJyuDSu+sOFMlQPB3AWx5LpFdiWzI3yYjBDqvoFG9M="
  reboot_timeout: 0s

# Enable mDNS service advertisement for discovery
mdns:
  disabled: false

ota:
  - platform: esphome
    password: !secret ota_pwd

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Static IP to avoid DHCP reassignment on Android hotspot reboot
  manual_ip:
    static_ip: 10.129.28.200
    gateway: 10.129.28.1
    subnet: 255.255.255.0
    dns1: 10.129.28.1

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esphymer Fallback Hotspot"
    password: !secret ap_pwd

captive_portal:

globals:
  - id: PI
    type: double
    restore_value: yes
    initial_value: '3.14159265358979323846'

external_components:
  # Local fork of Fabian-Schmidt/esphome-truma_inetbox, fixed for ESPHome 2026.x
  # (get_uart_event_queue removed from IDFUARTComponent; we now own the event queue in LinBusListener)
  - source:
      type: local
      path: external_components
    components: ["truma_inetbox"]

uart:
  - id: lin_uart_bus
    tx_pin: GPIO21
    rx_pin: GPIO20
    baud_rate: 9600
    stop_bits: 2

truma_inetbox:
  uart_id: lin_uart_bus

i2c:
  sda: GPIO8
  scl: GPIO9
  scan: true
  id: bus_a

one_wire:
  - platform: gpio
    pin:
      number: GPIO10
      mode:
        input: true
        pullup: true  # ~45 kΩ internal pull-up; works for short 1-wire runs without external resistor
    id: bus_b

switch:
  - platform: template
    name: Parking
    id: switch1
    optimistic: true
    lambda: return id(switch1).state;

  - platform: gpio
    pin: GPIO6
    name: "Phone Charger"
    inverted: true

binary_sensor:
  - platform: gpio
    pin: GPIO7
    name: "PIR Sensor"
    device_class: motion

  - platform: truma_inetbox
    name: "CP Plus alive"
    type: CP_PLUS_CONNECTED

sensor:
  - platform: truma_inetbox
    name: "Current Room Temperature"
    type: CURRENT_ROOM_TEMPERATURE
  - platform: truma_inetbox
    name: "Current Water Temperature"
    type: CURRENT_WATER_TEMPERATURE
  - platform: truma_inetbox
    name: "Target Room Temperature"
    type: TARGET_ROOM_TEMPERATURE
  - platform: truma_inetbox
    name: "Target Water Temperature"
    type: TARGET_WATER_TEMPERATURE

  - platform: bme280_i2c
    i2c_id: bus_a
    address: 0x76
    temperature:
      name: "BME280 Temperature"
    pressure:
      name: "BME280 Pressure"
    humidity:
      name: "BME280 Humidity"

  - platform: dallas_temp
    one_wire_id: bus_b
    address: 0x8b3c01f095401e28
    name: "T1"
    unit_of_measurement: "°C"
    # update_interval: 5min  # long interval reduces blocking bus-reset attempts when wire is faulted

  - platform: dallas_temp
    one_wire_id: bus_b
    address: 0xa83c01f095b01928
    name: "T2"
    unit_of_measurement: "°C"
    # update_interval: 5min

  - platform: dallas_temp
    one_wire_id: bus_b
    address: 0xdb3c01f0952a3328
    name: "T3"
    unit_of_measurement: "°C"
    # update_interval: 5min

  - platform: mpu6050
    address: 0x68
    i2c_id: bus_a
    accel_x:
      id: accel_x
      name: "MPU6050 Accel X"
      filters:
       - sliding_window_moving_average:
          window_size: 10
          send_every: 5
       - offset: 1.0
    accel_y:
      id: accel_y
      name: "MPU6050 Accel Y"
      filters:
       - sliding_window_moving_average:
          window_size: 10
          send_every: 5
       - offset: -6.4
    accel_z:
      id: accel_z
      name: "MPU6050 Accel z"
      filters:
       - sliding_window_moving_average:
          window_size: 10
          send_every: 5
       - offset: -7.4
    gyro_x:
      name: "MPU6050 Gyro X"
      id: gyro_x
      filters:
       - sliding_window_moving_average:
          window_size: 10
          send_every: 5
    gyro_y:
      name: "MPU6050 Gyro Y"
      id: gyro_y
      filters:
       - sliding_window_moving_average:
          window_size: 10
          send_every: 5
    gyro_z:
      name: "MPU6050 Gyro z"
      id: gyro_z
      filters:
       - sliding_window_moving_average:
          window_size: 10
          send_every: 5
    temperature:
      name: "MPU6050 Temperature"
      filters:
       - sliding_window_moving_average:
          window_size: 10
          send_every: 10
    update_interval: 2s
    id: accel

  - platform: template
    id: roll
    name: roll
    accuracy_decimals: 3
    lambda: |-
      return  (atan( id(accel_y).state / sqrt( pow( id(accel_x).state , 2) + pow( id(accel_z).state , 2) ) ) * 180 / id(PI)) ;
    update_interval: 200ms
    unit_of_measurement: "°"

  - platform: template
    id: pitch
    name: pitch
    accuracy_decimals: 3
    lambda: |-
      return  (atan(-1 * id(accel_x).state / sqrt(pow(id(accel_y).state, 2) + pow(id(accel_z).state, 2))) * 180 / id(PI));
    update_interval: 200ms
    unit_of_measurement: "°"

  - platform: template
    id: angleX
    name: angleX
    accuracy_decimals: 3
    lambda: |-
      return  (asin(id(accel_x).state / 9.81) * 180 / id(PI)) * -1;
    update_interval: 200ms
    unit_of_measurement: "°"

  - platform: template
    id: angleY
    name: angleY
    accuracy_decimals: 3
    lambda: |-
      return  (asin(id(accel_y).state / 9.81) * 180 / id(PI)) * -1;
    update_interval: 200ms
    unit_of_measurement: "°"

interval:
  - interval: 200ms
    then:
      - if:
          condition:
            - switch.is_on: switch1
          then:
            - component.update: accel