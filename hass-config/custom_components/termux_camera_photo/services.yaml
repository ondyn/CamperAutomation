capture_photo:
  name: Capture photo
  description: Capture a photo using termux-camera-photo and refresh the gallery entities.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry ID when multiple camera entries exist.
      required: false
      selector:
        text:
    camera_id:
      name: Camera ID
      description: Optional Termux camera ID override for this capture.
      required: false
      selector:
        number:
          min: 0
          max: 8
          step: 1